version = 0.1

[default.deploy.parameters]
stack_name = "zoolanding-data-dropper"
region = "us-east-1"
resolve_s3 = true
confirm_changeset = false
capabilities = "CAPABILITY_IAM"
parameter_overrides = "RawBucketName=zoolanding-data-raw LogLevel=INFO"

[test.deploy.parameters]
stack_name = "zoolanding-data-dropper-test"
region = "us-east-1"
resolve_s3 = true
confirm_changeset = false
capabilities = "CAPABILITY_IAM"
parameter_overrides = "EnvironmentName=test ManageRawBucket=true RawBucketName=zoolanding-data-raw-test LogLevel=INFO"

[prod.deploy.parameters]
stack_name = "zoolanding-data-dropper"
region = "us-east-1"
resolve_s3 = true
confirm_changeset = false
capabilities = "CAPABILITY_IAM"
parameter_overrides = "EnvironmentName=prod ManageRawBucket=false RawBucketName=zoolanding-data-raw LogLevel=INFO"
