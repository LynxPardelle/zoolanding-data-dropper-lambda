AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Zoolanding Data Dropper Lambda - SAM Template

Parameters:
  EnvironmentName:
    Type: String
    Default: prod
    AllowedValues: [test, prod, production]
    Description: Deployment environment name used for tags and environment-specific stack configuration.
  ManageRawBucket:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: Set to true for new non-production stacks that should create the raw analytics S3 bucket.
  RawBucketName:
    Type: String
    Default: zoolanding-data-raw
    Description: S3 bucket that stores raw analytics events.
  LogLevel:
    Type: String
    Default: INFO
    AllowedValues: [DEBUG, INFO, ERROR]
    Description: Log level for the Lambda.

Conditions:
  ShouldManageRawBucket:
    Fn::Equals:
      - Ref: ManageRawBucket
      - 'true'

Globals:
  Function:
    Runtime: python3.13
    Timeout: 10
    MemorySize: 256
    Tracing: PassThrough
    Tags:
      Project: Zoolandingpage
      Component: DataDropper
      ManagedBy: SAM
      Environment:
        Ref: EnvironmentName

Resources:
  RawAnalyticsBucket:
    Type: AWS::S3::Bucket
    Condition: ShouldManageRawBucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName:
        Ref: RawBucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: Zoolandingpage
        - Key: Component
          Value: DataDropperRaw
        - Key: ManagedBy
          Value: SAM
        - Key: Environment
          Value:
            Ref: EnvironmentName

  DataDropperApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowMethods: "'POST,OPTIONS'"

  DataDropperFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/data-dropper
      Handler: lambda_function.lambda_handler
      Description: Receives analytics payloads and stores the original JSON into a date-partitioned S3 key.
      Environment:
        Variables:
          RAW_BUCKET_NAME:
            Ref: RawBucketName
          ENVIRONMENT_NAME:
            Ref: EnvironmentName
          LOG_LEVEL:
            Ref: LogLevel
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - s3:PutObject
              Resource:
                Fn::Sub: arn:aws:s3:::${RawBucketName}/*
      Events:
        AnalyticsPost:
          Type: Api
          Properties:
            RestApiId:
              Ref: DataDropperApi
            Path: /analytics
            Method: POST

Outputs:
  ApiUrl:
    Description: Data dropper endpoint URL.
    Value:
      Fn::Sub: https://${DataDropperApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/analytics
  FunctionName:
    Description: Deployed Lambda function name.
    Value:
      Ref: DataDropperFunction
