name: Deploy Test

on:
  workflow_dispatch:
  push:
    branches: [test]

permissions:
  contents: read
  pull-requests: read

env:
  AWS_DEFAULT_REGION: us-east-1
  AWS_REGION: us-east-1
  SAM_CLI_TELEMETRY: 0

concurrency:
  group: data-dropper-test-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      artifact_id: ${{ steps.upload.outputs.artifact-id }}
      artifact_name: ${{ steps.artifact_metadata.outputs.name }}
      manifest_digest: ${{ steps.manifest.outputs.digest }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22'

      - name: Verify protected target branch
        shell: bash
        env:
          CURRENT_REF: ${{ github.ref }}
          TARGET_REF: refs/heads/test
        run: |
          set -euo pipefail
          if [[ "$CURRENT_REF" != "$TARGET_REF" ]]; then
            echo "Test deploys must run from $TARGET_REF."
            exit 1
          fi

      - name: Verify exact dev-to-test merged PR
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node tools/verify-promotion-commit.mjs --source=dev --target=test

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.13'

      - uses: aws-actions/setup-sam@89ddb14d60e682855e3fea4be85b3c56485de310 # v3
        with:
          version: 1.163.0
          use-installer: true
          token: ${{ github.token }}

      - name: Validate candidate and build exact artifact
        shell: bash
        env:
          LOG_LEVEL: ERROR
        run: |
          set -euo pipefail
          python -m unittest discover -s tests -p "test_*.py"
          python tools/build_lambda_package.py
          sam validate --lint
          sam build --no-cached
          python tools/build_lambda_package.py --verify-sam-build

      - name: Write validated build manifest
        id: manifest
        shell: bash
        run: |
          set -euo pipefail
          (cd .aws-sam/build && LC_ALL=C find . -type f -print0 | LC_ALL=C sort -z | xargs -0 sha256sum) > .aws-sam/build-manifest.sha256
          digest="$(sha256sum .aws-sam/build-manifest.sha256 | cut -d ' ' -f 1)"
          if [[ ! "$digest" =~ ^[a-f0-9]{64}$ ]]; then
            echo "manifest_digest_invalid"
            exit 1
          fi
          printf 'digest=%s\n' "$digest" >> "$GITHUB_OUTPUT"

      - name: Define artifact identity
        id: artifact_metadata
        shell: bash
        env:
          ARTIFACT_NAME: data-dropper-test-build-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.sha }}
        run: |
          set -euo pipefail
          printf 'name=%s\n' "$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload exact validated artifact
        id: upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.artifact_metadata.outputs.name }}
          path: |
            .aws-sam/build/
            .aws-sam/build-manifest.sha256
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 1

      - name: Reverify exact dev-to-test merged PR after artifact creation
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node tools/verify-promotion-commit.mjs --source=dev --target=test

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    environment: test
    permissions:
      contents: read
      id-token: write
      pull-requests: read
    steps:
      - name: Validate artifact handoff metadata
        shell: bash
        env:
          EXPECTED_ARTIFACT_ID: ${{ needs.validate.outputs.artifact_id }}
          EXPECTED_ARTIFACT_NAME: ${{ needs.validate.outputs.artifact_name }}
          EXPECTED_MANIFEST_DIGEST: ${{ needs.validate.outputs.manifest_digest }}
        run: |
          set -euo pipefail
          if [[ ! "$EXPECTED_ARTIFACT_ID" =~ ^[1-9][0-9]*$ ]]; then
            echo "artifact_id_invalid"
            exit 1
          fi
          artifact_name_pattern="^data-dropper-test-build-${GITHUB_RUN_ID}-[1-9][0-9]*-${GITHUB_SHA}$"
          if [[ ! "$EXPECTED_ARTIFACT_NAME" =~ $artifact_name_pattern ]]; then
            echo "artifact_name_invalid"
            exit 1
          fi
          if [[ ! "$EXPECTED_MANIFEST_DIGEST" =~ ^[a-f0-9]{64}$ ]]; then
            echo "manifest_digest_invalid"
            exit 1
          fi

      - name: Download validated artifact by immutable ID
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          artifact-ids: ${{ needs.validate.outputs.artifact_id }}
          path: .aws-sam

      - name: Verify validated build artifact
        shell: bash
        env:
          EXPECTED_MANIFEST_DIGEST: ${{ needs.validate.outputs.manifest_digest }}
        run: |
          set -euo pipefail
          test -f .aws-sam/build-manifest.sha256
          test -f .aws-sam/build/DataDropperFunction/lambda_function.py
          test -f .aws-sam/build/template.yaml
          printf '%s  %s\n' "$EXPECTED_MANIFEST_DIGEST" '.aws-sam/build-manifest.sha256' \
            | sha256sum --check --strict -
          (cd .aws-sam/build && sha256sum --check --strict ../build-manifest.sha256)
          printf '%s\n' \
            './DataDropperFunction/lambda_function.py' \
            './template.yaml' > "$RUNNER_TEMP/expected-build-files.txt"
          cut -c67- .aws-sam/build-manifest.sha256 | LC_ALL=C sort > "$RUNNER_TEMP/manifest-paths.txt"
          (cd .aws-sam/build && LC_ALL=C find . -type f -print | LC_ALL=C sort) > "$RUNNER_TEMP/artifact-paths.txt"
          diff -u "$RUNNER_TEMP/expected-build-files.txt" "$RUNNER_TEMP/manifest-paths.txt"
          diff -u "$RUNNER_TEMP/expected-build-files.txt" "$RUNNER_TEMP/artifact-paths.txt"
          printf '%s\n' \
            './build-manifest.sha256' \
            './build/DataDropperFunction/lambda_function.py' \
            './build/template.yaml' > "$RUNNER_TEMP/expected-artifact-files.txt"
          (cd .aws-sam && LC_ALL=C find . -type f -print | LC_ALL=C sort) > "$RUNNER_TEMP/all-artifact-paths.txt"
          diff -u "$RUNNER_TEMP/expected-artifact-files.txt" "$RUNNER_TEMP/all-artifact-paths.txt"

      - uses: aws-actions/setup-sam@89ddb14d60e682855e3fea4be85b3c56485de310 # v3
        with:
          version: 1.163.0
          use-installer: true
          token: ${{ github.token }}

      - uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          EXPECTED_SHA: ${{ github.sha }}
          SOURCE_BRANCH: dev
          TARGET_BRANCH: test
        with:
          github-token: ${{ github.token }}
          script: |
            const fail = code => { throw new Error(code); };
            const isSha = value => /^[a-f0-9]{40}$/.test(value ?? '');
            const repository = process.env.GITHUB_REPOSITORY;
            const sha = process.env.EXPECTED_SHA;
            const sourceBranch = process.env.SOURCE_BRANCH;
            const targetBranch = process.env.TARGET_BRANCH;
            if (!repository || !isSha(sha) || process.env.GITHUB_REF !== `refs/heads/${targetBranch}`) {
              fail('promotion_context_invalid');
            }
            const [owner, repo] = repository.split('/');
            const { data: commit } = await github.rest.git.getCommit({ owner, repo, commit_sha: sha });
            const parents = Array.isArray(commit.parents) ? commit.parents.map(parent => parent.sha) : [];
            if (parents.length !== 2 || parents.some(parent => !isSha(parent))) {
              fail('promotion_merge_commit_required');
            }
            let pullRequests = [];
            for (let attempt = 1; attempt <= 3; attempt += 1) {
              const response = await github.request('GET /repos/{owner}/{repo}/commits/{commit_sha}/pulls', {
                owner,
                repo,
                commit_sha: sha,
                per_page: 100,
                headers: { accept: 'application/vnd.github+json', 'X-GitHub-Api-Version': '2026-03-10' },
              });
              pullRequests = response.data;
              if (!Array.isArray(pullRequests) || pullRequests.length > 100) fail('promotion_api_invalid_response');
              if (pullRequests.length > 0 || attempt === 3) break;
              await new Promise(resolve => setTimeout(resolve, 1500));
            }
            const matches = pullRequests.filter(pullRequest => (
              pullRequest?.state === 'closed'
              && typeof pullRequest.merged_at === 'string'
              && pullRequest.merged_at.length > 0
              && (pullRequest.merge_commit_sha == null || pullRequest.merge_commit_sha === sha)
              && pullRequest.base?.ref === targetBranch
              && pullRequest.base?.repo?.full_name === repository
              && isSha(pullRequest.base?.sha)
              && pullRequest.head?.ref === sourceBranch
              && pullRequest.head?.repo?.full_name === repository
              && isSha(pullRequest.head?.sha)
            ));
            if (matches.length !== 1) fail(matches.length === 0 ? 'promotion_pr_not_found' : 'promotion_pr_ambiguous');
            const pullRequest = matches[0];
            if (parents[0] !== pullRequest.base.sha) fail('promotion_first_parent_mismatch');
            if (parents[1] !== pullRequest.head.sha) fail('promotion_second_parent_mismatch');
            if (context.eventName === 'push') {
              const event = context.payload;
              if (event.forced === true || event.created === true || event.deleted === true
                || event.after !== sha || !isSha(event.before) || /^0+$/.test(event.before)
                || parents[0] !== event.before) {
                fail('promotion_push_not_allowed');
              }
            } else if (context.eventName !== 'workflow_dispatch') {
              fail('promotion_event_not_allowed');
            }
            const { data: branch } = await github.rest.repos.getBranch({ owner, repo, branch: targetBranch });
            if (branch.commit.sha !== sha) fail('promotion_target_tip_mismatch');
            core.info('promotion_provenance_verified');

      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Deploy test
        run: sam deploy --template-file .aws-sam/build/template.yaml --stack-name zoolanding-data-dropper-test --region us-east-1 --resolve-s3 --capabilities CAPABILITY_IAM --no-confirm-changeset --no-fail-on-empty-changeset --parameter-overrides "EnvironmentName=test" "ManageRawBucket=true" "RawBucketName=zoolanding-data-raw-test" "LogLevel=INFO"
