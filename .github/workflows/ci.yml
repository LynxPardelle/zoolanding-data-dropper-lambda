name: CI

on:
  push:
    branches: [dev, test, main, 'codex/**']
  pull_request:
    branches: [dev, test, main]

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Enforce promotion graph
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            exit 0
          fi
          base="${{ github.base_ref }}"
          head="${{ github.head_ref }}"
          if [[ "$base" == "test" && "$head" != "dev" ]]; then
            echo "Pull requests into test must come from dev."
            exit 1
          fi
          if [[ "$base" == "main" && "$head" != "test" ]]; then
            echo "Pull requests into main must come from test."
            exit 1
          fi
  test:
    runs-on: ubuntu-latest
    needs: guard
    env:
      AWS_DEFAULT_REGION: us-east-1
      AWS_REGION: us-east-1
      SAM_CLI_TELEMETRY: 0
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Run unit tests
        env:
          LOG_LEVEL: ERROR
        run: python -m unittest discover -s tests -p "test_*.py"
      - name: Optional dependency audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt
          else
            echo "No requirements.txt found; skipping dependency audit."
          fi
      - uses: aws-actions/setup-sam@v3
      - name: Validate SAM template
        run: sam validate
